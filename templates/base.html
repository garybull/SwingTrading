<!DOCTYPE html>
<html>

<head>
    <title>Bull Trading Systems</title>

    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1e293b;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: #38bdf8;
        }

        nav {
            background: #020617;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: #94a3b8;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #334155;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #1e293b;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

    <header>📈 Bull Trading Systems</header>

    <nav>
        <a href="/">Dashboard</a>
        <a href="/trade_plan">Trade Plan</a> <!-- 🔥 ADD THIS -->
        <a href="/positions">Positions</a>
        <a href="/history">History</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
