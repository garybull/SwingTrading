<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bull Trading Systems</title>

    <!-- ✅ YOUR REAL STYLES -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="/">Dashboard</a>
        <a href="/trade_plan">Trade Plan</a>
        <a href="/positions">Positions</a>
        <a href="/history">History</a>
        <a href="/performance">Performance</a>
        <a href="/setup_performance">Setup Performance</a>
    </div>

    <!-- 🔥 FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="container">
        {% for category, message in messages %}
        <div class="flash {{ category }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- MAIN CONTENT -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
