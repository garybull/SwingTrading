<!-- templates/base.html -->

<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Bull Analytics and Trading Engine
    </title>

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {

            box-sizing: border-box;

        }

        body {

            margin: 0;

            padding: 0;

            font-family: 'Inter', sans-serif;

            background: linear-gradient(180deg,
                    #081224 0%,
                    #0f172a 100%);

            color: #f1f5f9;

        }

        a {

            text-decoration: none;

            color: inherit;

        }

        .container {

            width: 100%;

            max-width: 2000px;

            margin: 0 auto;

            padding: 24px;

        }

        .header {

            margin-bottom: 28px;

        }

        .title {

            font-size: 54px;

            font-weight: 800;

            margin-bottom: 24px;

            letter-spacing: -1px;

        }

        .nav {

            display: flex;

            flex-wrap: wrap;

            gap: 18px;

        }

        .nav a {

            padding: 14px 22px;

            background: rgba(255, 255, 255, 0.08);

            border-radius: 14px;

            font-weight: 600;

            transition: all 0.2s ease;

        }

        .nav a:hover {

            background: rgba(59, 130, 246, 0.4);

            transform: translateY(-2px);

        }

        .card {

            background: rgba(255, 255, 255, 0.08);

            border-radius: 20px;

            padding: 28px;

            margin-bottom: 28px;

            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.25);

            backdrop-filter: blur(10px);

        }

        h1,
        h2,
        h3 {

            margin-top: 0;

            color: #f8fafc;

        }

        h2 {

            font-size: 28px;

            margin-bottom: 22px;

        }

        table {

            width: 100%;

            border-collapse: collapse;

        }

        th {

            text-align: left;

            padding: 16px 12px;

            border-bottom: 1px solid rgba(255, 255, 255, 0.12);

            color: #9ca3af;

            font-size: 14px;

            text-transform: uppercase;

        }

        td {

            padding: 18px 12px;

            border-bottom: 1px solid rgba(255, 255, 255, 0.08);

            font-size: 16px;

        }

        tr:hover {

            background: rgba(255, 255, 255, 0.04);

        }

        button {

            width: 100%;

            background: linear-gradient(135deg,
                    #2563eb,
                    #3b82f6);

            color: white;

            border: none;

            padding: 16px;

            border-radius: 12px;

            font-size: 16px;

            font-weight: 700;

            cursor: pointer;

            transition: all 0.2s ease;

        }

        button:hover {

            transform: translateY(-1px);

            opacity: 0.95;

        }

        button:disabled {

            opacity: 0.6;

            cursor: not-allowed;

        }

        input,
        select {

            width: 100%;

            padding: 14px;

            margin-top: 6px;

            margin-bottom: 18px;

            border-radius: 10px;

            border: 1px solid rgba(255, 255, 255, 0.12);

            background: rgba(255, 255, 255, 0.06);

            color: white;

            font-size: 15px;

        }

        label {

            font-weight: 600;

            display: block;

            margin-bottom: 6px;

        }

        .grid {

            display: grid;

            grid-template-columns: repeat(auto-fit,
                    minmax(320px, 1fr));

            gap: 24px;

        }

        .positive {

            color: #34d399;

            font-weight: 700;

        }

        .negative {

            color: #ef4444;

            font-weight: 700;

        }

        .warning {

            color: #facc15;

            font-weight: 600;

        }

        .muted {

            color: #9ca3af;

        }

        .metric {

            font-size: 42px;

            font-weight: 800;

            margin-top: 8px;

        }

        .submetric {

            font-size: 14px;

            color: #94a3b8;

        }

        .spinner {

            border: 6px solid #2a3447;

            border-top: 6px solid #3b82f6;

            border-radius: 50%;

            width: 40px;

            height: 40px;

            animation: spin 1s linear infinite;

            margin-bottom: 15px;

        }

        @keyframes spin {

            0% {

                transform: rotate(0deg);

            }

            100% {

                transform: rotate(360deg);

            }

        }

        .status-pill {

            display: inline-block;

            padding: 8px 14px;

            border-radius: 999px;

            font-size: 13px;

            font-weight: 700;

            background: rgba(59, 130, 246, 0.2);

            color: #93c5fd;

            margin-top: 10px;

        }

        .chart-container {

            width: 100%;

            overflow-x: auto;

        }

        footer {

            text-align: center;

            color: #64748b;

            font-size: 13px;

            padding: 30px 0;

        }

        @media (max-width: 768px) {

            .title {

                font-size: 36px;

            }

            .nav {

                gap: 10px;

            }

            .nav a {

                padding: 12px 16px;

                font-size: 14px;

            }

            .card {

                padding: 20px;

            }

            h2 {

                font-size: 22px;

            }

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="header">

            <div class="title">

                🐂 Bull Analytics and Trading Engine 📈 🚀

            </div>

            <div class="nav">

                <a href="/">
                    Dashboard
                </a>

                <a href="/recommendations">
                    Recommendations
                </a>

                <a href="/execute_trade">
                    Execute Trades
                </a>

                <a href="/history">
                    History
                </a>

                <a href="/pl_analytics">
                    P/L Analytics
                </a>

                <a href="/benchmarks">
                    Benchmarks
                </a>

                <a href="/trade_analytics">
                    Trade Analytics
                </a>

                <a href="/risk">
                    Risk
                </a>

                <a href="/rolling_analytics">
                    Rolling Analytics
                </a>

            </div>

        </div>

        {% block content %}
        {% endblock %}

        <footer>

            Bull Analytics and Trading Engine •
            Systematic Momentum Platform

        </footer>

    </div>

</body>

</html>
